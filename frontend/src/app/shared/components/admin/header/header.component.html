

<header
  class="sticky top-0 z-30 border-b border-outline-variant/20 bg-[#f7f9fb]/88 text-sm shadow-[0_10px_30px_rgba(0,14,36,0.04)] backdrop-blur-xl dark:bg-[#022448]/88">
  <div class="flex min-h-14 items-center justify-between gap-3 px-4 py-2.5 sm:px-6 lg:px-8">
    <!-- Mobile Menu Button -->
    <button class="inline-flex h-10 w-10 items-center justify-center rounded-lg text-[#022448] transition hover:bg-surface-container md:hidden" aria-label="Open navigation">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <div class="hidden min-w-0 md:flex md:flex-1 md:items-center">
      <!-- Search Bar -->
      <div
        class="relative flex h-10 w-80 items-center rounded-lg border border-outline-variant/30 bg-surface-container-lowest px-3 shadow-sm transition-colors lg:w-96">
        <span class="material-symbols-outlined text-on-surface-variant text-[18px] mr-2">search</span>
        <input
          class="w-full border-none bg-transparent p-0 font-['Inter'] text-sm font-normal normal-case text-on-surface outline-none placeholder:text-on-surface-variant/60 focus:ring-0"
          placeholder="Search archive..." type="text"/>
      </div>

    </div>
    <div class="flex items-center gap-2 text-[#022448] dark:text-[#f7f9fb] sm:gap-3">
      <button (click)="themeService.toggleMode()" type="button" aria-label="Toggle theme"
              class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition hover:bg-surface-container active:scale-95 dark:hover:bg-slate-800">
        @if (themeService.isDarkMode$ | async) {
          <span class="material-symbols-outlined text-amber-400">light_mode</span>
        } @else {
          <span class="material-symbols-outlined text-indigo-600">dark_mode</span>
        }
      </button>
      <button type="button" aria-label="Notifications"
        class="relative flex h-10 w-10 items-center justify-center rounded-lg transition-all duration-200 hover:bg-surface-container active:scale-95 dark:hover:bg-slate-800/50">
        <span class="material-symbols-outlined">notifications_active</span>
        <span class="absolute right-2.5 top-2.5 h-2 w-2 rounded-full bg-error"></span>
      </button>

      <div class="relative">
        <!-- Avatar toujours visible -->
        <div
          class="h-10 w-10 cursor-pointer overflow-hidden rounded-full border-2 border-surface-container-lowest shadow-sm"
          (click)="toggleDropdown($event)">
          <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeeqC7RQ1wLaOfKJlEPANNY9p-rV9593BIIdNqL63skdiIZ6nqYz1V-ktCan3q_N5sY0GtVROQqeCQ3QWN9vgeAZeRVmVAC1utHHpnKWcGKZFkw34MCdRLpvfXL1YEGnd4x09SHJK9eqSlFrUNGghZ3cKVwteflDvvGeh6odL6scTI4-joMWja0j51NnWabvlNJoT1BwcXoQ8L1fgZXKcj6csf2lbQOcVKz_coOVJCS2wi6bjhUUfrarLBkKbUF5Dnok4xea_4vSU"/>
        </div>
        <!-- Dropdown conditionnel -->
        @if (isDropdownOpen) {
          <div class="absolute right-0 mt-2 w-44 overflow-hidden rounded-lg border border-outline-variant/20 bg-white shadow-lg dark:bg-slate-800">
            <button (click)="logout()"
                    class="flex w-full items-center gap-3 px-4 py-2.5 text-sm text-error hover:bg-red-50 dark:hover:bg-red-900/20">
              <span class="material-symbols-outlined text-lg">logout</span>
              Sign out
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
