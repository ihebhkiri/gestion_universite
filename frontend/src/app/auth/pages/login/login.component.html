<body class="bg-background font-body text-on-surface antialiased min-h-screen flex flex-col">
<div class="fixed inset-0 z-0">
  <img class="w-full h-full object-cover grayscale-[20%]"
       data-alt="wide shot of a modern glass university library building with students walking in the distance under soft afternoon sunlight"
       src="https://lh3.googleusercontent.com/aida-public/AB6AXuAr_CZkUe2gkXBZ1MZyfghCchKLypc1jy19DqLIMOfQS0WibpEmkeP5Ms-cogUpgiUDjzaDG1SoRPKIdV2VLs-t2fOYCiLnoVjwV3ndQe1e0eHUIeV0gT5LTJyFDELS2tkEbaR2AN63NPW66-PHmmfSXb4CodV_R_g5pPMXzusBu9SHGHFKe3VaioIGAv4nOhW3JBNORaKdrPwTx7-L8r_KNOiJPt2byoc4kJvRQk-ReTtWJ-Zrym2CfndJu3vhaGdyDYH0SDDmFrCY"/>
  <div class="absolute inset-0 academic-overlay z-10"></div>
  <div class="absolute inset-0 guilloche-pattern z-20 opacity-50"></div>
</div>
<main class="relative z-30 flex-grow flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-[480px]">
    <div class="bg-surface-container-lowest rounded-xl ambient-shadow overflow-hidden p-8 md:p-12">
      <div class="flex flex-col items-center mb-10">
        <div class="w-50 h-50 mb-4 flex items-center justify-center rounded-lg bg-primary-container/10 p-2">
          <img alt="ACADEMIX" class="w-full h-full object-contain"
               src="logoWithTitle.png"/>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="email">Email
            Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
              <span class="material-symbols-outlined text-xl">mail</span>
            </div>
            <input
              class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-transparent border focus:border-primary/40 focus:ring-4 focus:ring-primary/5 rounded-lg text-on-surface placeholder:text-outline/60 transition-all duration-300 outline-none"
              id="email" name="email" placeholder="name@university.edu" required type="email"
              formControlName="email"/>
          </div>
        </div>
        <div>
          <div class="flex justify-between items-center mb-2 px-1">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
            <a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors duration-200"
               routerLink='/auth/forgot-password'>Forgot password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline"
            >
              <span class="material-symbols-outlined text-xl">lock</span>
            </div>
            <input
              class="block w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-transparent border focus:border-primary/40 focus:ring-4 focus:ring-primary/5 rounded-lg text-on-surface placeholder:text-outline/60 transition-all duration-300 outline-none"
              id="password" name="password" placeholder="••••••••" required="" [type]="showPassword ? 'text':'password'"
              formControlName="password"/>
            <button
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors"
              type="button" (click)="togglePassword()">
              <span
                class="material-symbols-outlined text-xl"> {{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <div class="space-y-4 pt-2">
          <button
            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-on-primary bg-primary hover:bg-primary-container hover:-translate-y-0.5 transition-all duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary"
            type="submit">
            Sign In
          </button>

        </div>
      </form>
      <div class="mt-10 text-center">
        <p class="text-xs font-medium text-on-surface-variant flex items-center justify-center gap-1.5">
          Don't have an account?
          <a class="text-primary font-bold hover:underline" >Contact Administration</a>
        </p>
      </div>
    </div>
  </div>
</main>


</body>
