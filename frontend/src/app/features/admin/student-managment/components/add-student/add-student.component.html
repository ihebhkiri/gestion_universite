<!-- Add Student Modal -->
@if (isVisible) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-background/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>

  <!-- Modal Panel -->
  <div
    class="relative bg-surface rounded-2xl shadow-[0_24px_48px_rgba(2,36,72,0.12)] border border-outline-variant/30 w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">

    <!-- Header -->
    <div
      class="px-6 py-4 border-b border-outline-variant/20 flex items-center justify-between bg-surface-container-lowest sticky top-0 z-10">
      <div>
        <h3 class="font-headline text-xl font-semibold text-primary-container">Admit New Student</h3>
        <p class="font-body text-sm text-on-surface-variant mt-0.5">Register a new student into the university system.
        </p>
      </div>
      <button (click)="onClose()"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant transition-colors group">
        <span class="material-symbols-outlined text-lg group-hover:text-error transition-colors">close</span>
      </button>
    </div>

    <!-- Scrollable Body -->
    <div class="p-6 overflow-y-auto">
      <form (ngSubmit)="onSubmit()" #studentForm="ngForm" class="space-y-6">

        <!-- Profile Image Upload Area -->
        <div
          class="flex items-center gap-6 p-4 rounded-xl border border-dashed border-outline-variant/50 bg-surface-container-lowest">
          <div
            class="w-16 h-16 rounded-full overflow-hidden bg-surface-container flex items-center justify-center border-2 border-surface shadow-sm">
            @if (imagePreview) {
            <img [src]="imagePreview" class="w-full h-full object-cover">
            } @else {
            <span class="material-symbols-outlined text-3xl text-primary/40">person</span>
            }
          </div>
          <div class="flex-1">
            <label class="block font-label text-sm font-semibold text-on-surface mb-1">Profile Photo (Optional)</label>
            <p class="text-xs text-on-surface-variant mb-3">Upload a clean, professional headshot. Max 5MB.</p>
            <input type="file" accept="image/*" class="hidden" #fileInput (change)="onFileSelected($event)">
            <button type="button" (click)="fileInput.click()"
              class="px-4 py-1.5 bg-surface-container-high text-on-surface hover:bg-surface-container-highest border border-outline-variant/30 rounded-DEFAULT font-label text-xs font-semibold transition-colors">
              Choose Image
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- First Name -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">First Name <span
                class="text-error">*</span></label>
            <input [(ngModel)]="student.firstName" name="firstName" required
              class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
              placeholder="e.g. John">
          </div>
          <!-- Last Name -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Last Name <span
                class="text-error">*</span></label>
            <input [(ngModel)]="student.lastName" name="lastName" required
              class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
              placeholder="e.g. Doe">
          </div>

          <!-- Email -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Email Address <span
                class="text-error">*</span></label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">mail</span>
              <input [(ngModel)]="student.email" name="email" type="email" required
                class="w-full pl-9 pr-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
                placeholder="student@university.edu">
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Temporary Password <span
                class="text-error">*</span></label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">lock</span>
              <input [(ngModel)]="student.password" name="password" type="password" required
                class="w-full pl-9 pr-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
                placeholder="••••••••">
            </div>
          </div>

          <!-- CIN -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">National ID (CIN) <span
                class="text-error">*</span></label>
            <input [(ngModel)]="student.cin" name="cin" required
              class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
              placeholder="8-digit ID">
          </div>

          <!-- Phone -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Phone Number</label>
            <input [(ngModel)]="student.phone" name="phone"
              class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow"
              placeholder="+216 ...">
          </div>

          <!-- Gender -->
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Gender</label>
            <select [(ngModel)]="student.gender" name="gender"
              class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-DEFAULT font-body text-sm text-on-surface transition-shadow">
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
            </select>
          </div>
        </div>

      </form>
    </div>

    <!-- Footer Actions -->
    <div
      class="px-6 py-4 border-t border-outline-variant/20 bg-surface-container-lowest flex items-center justify-end gap-3 sticky bottom-0 z-10">
      <button type="button" (click)="onClose()"
        class="px-5 py-2 text-on-surface font-label text-sm font-semibold rounded-DEFAULT hover:bg-surface-container-highest transition-colors">
        Cancel
      </button>
      <button type="button" (click)="onSubmit()" [disabled]="!studentForm.valid"
        class="px-5 py-2 bg-gradient-to-t from-primary to-primary-container text-on-primary font-label text-sm font-semibold rounded-DEFAULT shadow-[0_4px_12px_rgba(2,36,72,0.15)] hover:shadow-[0_6px_16px_rgba(2,36,72,0.2)] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">person_add</span>
        Admit Student
      </button>
    </div>

  </div>
</div>
}
