<section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
  @for (card of cards; track card.label) {
    <article class="summary-card">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="summary-label">{{ card.label }}</p>
          <p class="mt-2 truncate text-2xl font-semibold tracking-tight text-primary">
            @if (card.format === 'currency') {
              {{ card.value | number: '1.0-0' }} {{ currency }}
            } @else {
              {{ card.value | number: '1.0-1' }}%
            }
          </p>
        </div>
        <span class="material-symbols-outlined summary-icon">{{ card.icon }}</span>
      </div>
      <p class="mt-3 text-sm text-on-surface-variant">{{ card.hint }}</p>
    </article>
  }
</section>
