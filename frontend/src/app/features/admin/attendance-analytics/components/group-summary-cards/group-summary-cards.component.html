<section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-6" [@kpiCardsEnter]="summary?.totalRecords ?? 0">
  @for (card of cards; track card.label) {
    <article class="analytics-card">
      <div class="mb-4 flex items-center justify-between gap-3">
        <span class="analytics-icon" [ngClass]="toneClass(card.tone)">
          <span class="material-symbols-outlined text-[20px]">{{ card.icon }}</span>
        </span>
        <span class="h-2 w-2 rounded-full" [ngClass]="toneClass(card.tone)"></span>
      </div>
      <p class="text-xs font-black uppercase text-on-surface-variant">{{ card.label }}</p>
      <strong class="mt-2 block font-['Space_Grotesk'] text-2xl font-black text-primary">{{ card.value }}</strong>
      <small class="mt-1 block text-xs font-semibold text-on-surface-variant">{{ card.hint }}</small>
    </article>
  }
</section>
