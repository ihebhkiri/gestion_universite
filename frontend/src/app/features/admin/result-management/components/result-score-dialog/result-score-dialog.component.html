@if (visible) {
  <div class="result-dialog-backdrop" role="presentation" (click)="closed.emit()">
    <form class="result-dialog" [formGroup]="form" (ngSubmit)="submit()" role="dialog" aria-modal="true" aria-label="Modifier la note" (click)="$event.stopPropagation()">
      <header>
        <div>
          <p>Score</p>
          <h2>{{ studentName }}</h2>
        </div>
        <button type="button" class="result-icon-button" aria-label="Fermer" (click)="closed.emit()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </header>

      <label>
        <span>Note /20</span>
        <input type="number" min="0" max="20" step="0.25" formControlName="score" />
      </label>

      <label>
        <span>Note ou commentaire</span>
        <textarea rows="4" formControlName="comment" placeholder="Observation optionnelle"></textarea>
      </label>

      <footer>
        <button type="button" class="result-button result-button--secondary" (click)="closed.emit()">Annuler</button>
        <button type="submit" class="result-button result-button--primary" [disabled]="form.invalid || loading">
          Enregistrer
        </button>
      </footer>
    </form>
  </div>
}
