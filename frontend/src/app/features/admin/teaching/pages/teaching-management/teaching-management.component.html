<app-sidebar></app-sidebar>
<main class="flex-1 ml-68 min-h-screen flex flex-col">
  <app-header></app-header>

  <div class="p-8 space-y-8 max-w-7xl mx-auto w-full">
    <div class="flex flex-col md:flex-row justify-between md:items-end gap-4">
      <div>
        <h2 class="text-3xl font-bold tracking-tight text-primary font-headline">Teaching Management</h2>
        <p class="text-slate-500">Unified flow for teachers and subjects wired directly to teaching backend endpoints.</p>
      </div>

      <button class="inline-flex items-center gap-2 px-5 py-2.5 bg-primary-container text-white rounded-lg text-sm font-bold shadow-sm"
              (click)="openCreateTeacherModal()">
        <span class="material-symbols-outlined text-lg">person_add</span>
        Add Teacher
      </button>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <section class="xl:col-span-2">
        <app-teachers-table
          [teachers]="teachers"
          (editTeacher)="openEditTeacherModal($event)"
          (removeTeacher)="onDeleteTeacher($event)">
        </app-teachers-table>
      </section>

      <section>
        <app-subjects-panel
          [subjects]="subjects"
          (addSubject)="onAddSubject($event)"
          (updateSubject)="onUpdateSubject($event)"
          (deleteSubject)="onDeleteSubject($event)">
        </app-subjects-panel>
      </section>
    </div>
  </div>

  <app-teacher-form-modal
    [open]="modalOpen"
    [teacherToEdit]="teacherToEdit"
    [departments]="departments"
    (closeModal)="closeModal()"
    (createTeacher)="onCreateTeacher($event)"
    (updateTeacher)="onUpdateTeacher($event)">
  </app-teacher-form-modal>
</main>
