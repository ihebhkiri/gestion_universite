<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
  <div class="bg-surface-container-lowest p-4 rounded-xl curator-shadow border border-outline-variant/20 border-b-primary-container">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-[0.12em] mb-2">Total Users</p>
    <div class="flex items-baseline gap-2">
      <span class="text-2xl font-semibold font-headline">{{ statistics.totalUsers }}</span>
    </div>
  </div>
  <div class="bg-surface-container-lowest p-4 rounded-xl curator-shadow border border-outline-variant/20">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-[0.12em] mb-2">Active Users</p>
    <span class="text-2xl font-semibold font-headline text-primary-container">{{ statistics.activeUsers }}</span>
  </div>
  <div class="bg-surface-container-lowest p-4 rounded-xl curator-shadow border border-outline-variant/20">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-[0.12em] mb-2">Inactive Users</p>
    <span class="text-2xl font-semibold font-headline text-primary-container">{{ statistics.inactiveUsers }}</span>
  </div>

</div>
