@if (isVisible) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-background/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>
  <div class="relative bg-surface rounded-2xl shadow-[0_24px_48px_rgba(2,36,72,0.12)] border border-outline-variant/30 w-full max-w-lg overflow-hidden">
    <div class="px-6 py-4 border-b border-outline-variant/20 flex items-center justify-between bg-surface-container-lowest">
      <div>
        <h3 class="font-headline text-xl font-semibold text-primary-container">Create Subject</h3>
        <p class="font-body text-sm text-on-surface-variant mt-0.5">Define a new subject and grading weight.</p>
      </div>
      <button (click)="onClose()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>
    <div class="p-6">
      <form (ngSubmit)="onSubmit()" #subjectForm="ngForm" class="space-y-5">
        <div>
          <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Subject Name <span class="text-error">*</span></label>
          <input [(ngModel)]="form.subjectName" name="subjectName" required
                 class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"
                 placeholder="e.g. ALGORITHMS" />
        </div>
      </form>
    </div>
    <div class="px-6 py-4 border-t border-outline-variant/20 bg-surface-container-lowest flex items-center justify-end gap-3">
      <button type="button" (click)="onClose()" class="px-5 py-2 text-on-surface font-label text-sm font-semibold rounded-lg hover:bg-surface-container-highest transition-colors">Cancel</button>
      <button type="button" (click)="onSubmit()" [disabled]="!subjectForm.valid"
              class="px-5 py-2 bg-gradient-to-t from-primary to-primary-container text-on-primary font-label text-sm font-semibold rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all">
        Create Subject
      </button>
    </div>
  </div>
</div>
}
