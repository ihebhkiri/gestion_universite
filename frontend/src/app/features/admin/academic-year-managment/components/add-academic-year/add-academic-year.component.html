@if (isVisible) {
  <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold">Create Academic Year</h3>
        <button type="button" class="text-slate-500 hover:text-slate-700" (click)="onClose()">X</button>
      </div>

      <form class="space-y-4" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-sm mb-1">Label</label>
          <input
            type="text"
            [(ngModel)]="form.label"
            name="label"
            class="w-full border rounded-lg px-3 py-2"
            placeholder="e.g. 2025-2026"
            required
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">Start date</label>
            <input type="date" [(ngModel)]="form.startDate" name="startDate" class="w-full border rounded-lg px-3 py-2" required />
          </div>
          <div>
            <label class="block text-sm mb-1">End date</label>
            <input type="date" [(ngModel)]="form.endDate" name="endDate" class="w-full border rounded-lg px-3 py-2" required />
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" [(ngModel)]="form.active" name="active" class="rounded border-slate-300" />
          <span class="text-sm">Set as active (will deactivate other years)</span>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button type="button" class="px-4 py-2 border rounded-lg" (click)="onClose()">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-primary-container text-white rounded-lg">Create</button>
        </div>
      </form>
    </div>
  </div>
}
