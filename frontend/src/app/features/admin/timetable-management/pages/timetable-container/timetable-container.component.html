<app-sidebar></app-sidebar>
<section class="min-h-screen bg-background text-on-surface md:pl-72">
  <app-header></app-header>

  <main class="relative px-4 py-6 sm:px-6 lg:px-8">
    @if (facade.loading$ | async) {
      <div class="timetable-local-loader" aria-live="polite" aria-label="Loading timetable data">
        <div class="loader-panel">
          <div class="loader-ring"></div>
          <span>Loading timetable</span>
        </div>
      </div>
    }

    <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-xs font-semibold uppercase text-on-surface-variant">Academic planning</p>
        <h1 class="font-['Space_Grotesk'] text-2xl font-bold text-primary">Timetable</h1>
      </div>
      <button
        type="button"
        class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-on-primary shadow-sm transition hover:bg-primary-container"
        (click)="facade.openCreate()">
        <span class="material-symbols-outlined text-[18px]">add</span>
        Add slot
      </button>
    </div>

    <app-timetable-filters></app-timetable-filters>
    <app-timetable-grid></app-timetable-grid>
  </main>
</section>

<app-timetable-entry-dialog></app-timetable-entry-dialog>
