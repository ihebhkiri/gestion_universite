<section class="grid gap-4 sm:grid-cols-2 2xl:grid-cols-4">
  @for (card of cards; track card.label) {
    <article
      class="group relative overflow-hidden rounded-xl border border-outline-variant/20 bg-surface-container-lowest px-4 py-4 shadow-sm transition duration-200 hover:border-primary/25 hover:shadow-md">
      <div class="flex items-center justify-between gap-4">
        <div class="min-w-0">
          <p class="truncate text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant">{{ card.label }}</p>
          <div class="mt-2 font-['Space_Grotesk'] text-2xl font-semibold text-primary sm:text-3xl">{{ card.value }}</div>
        </div>

        <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg text-[22px] shadow-sm" [ngClass]="card.iconClass">
          <span class="material-symbols-outlined">{{ card.icon }}</span>
        </span>
      </div>

      <div class="mt-4 flex items-center justify-between gap-3">
        <p class="line-clamp-2 max-w-[16rem] text-sm leading-5 text-on-surface-variant">{{ card.hint }}</p>
        <span class="inline-flex rounded-full px-3 py-1 text-xs font-semibold" [ngClass]="card.chipClass">KPI</span>
      </div>
    </article>
  }
</section>
