<section class="rounded-xl border border-outline-variant/20 bg-surface-container-lowest p-4 shadow-sm sm:p-5">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div class="flex items-center gap-4">
      <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg bg-primary-fixed text-[22px] text-primary">
        <span class="material-symbols-outlined">{{ icon }}</span>
      </span>
      <div class="min-w-0">
        <h2 class="font-['Space_Grotesk'] text-xl font-semibold text-primary">{{ title }}</h2>
        <p class="mt-1 text-sm text-on-surface-variant">{{ subtitle }}</p>
      </div>
    </div>
    <div class="w-fit rounded-lg bg-surface-container-low px-3 py-1 text-xs font-semibold text-primary">Widget</div>
  </div>

  @if (items.length === 0) {
    <div class="grid min-h-56 place-items-center text-center text-on-surface-variant">
      <div>
        <span class="material-symbols-outlined text-4xl">inbox</span>
        <p class="mt-3 text-sm">{{ emptyText }}</p>
      </div>
    </div>
  } @else {
    <div class="mt-4 grid gap-3">
      @for (item of items; track item.title + item.subtitle) {
        <article class="rounded-lg border border-outline-variant/20 bg-surface-container-low p-3 transition-colors hover:border-primary/25">
          <div class="min-w-0">
            <div class="flex items-start justify-between gap-3">
              <strong class="truncate text-sm font-semibold text-on-surface">{{ item.title }}</strong>
              @if (item.badge) {
                <span class="inline-flex shrink-0 rounded-full px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.08em]" [ngClass]="item.badgeClass">
                  {{ item.badge }}
                </span>
              }
            </div>

            <p class="mt-2 text-sm leading-5 text-on-surface-variant">{{ item.subtitle }}</p>

            @if (item.meta) {
              <small class="mt-3 block text-xs font-semibold uppercase tracking-[0.08em] text-on-surface-variant">{{ item.meta }}</small>
            }
          </div>
        </article>
      }
    </div>
  }
</section>
