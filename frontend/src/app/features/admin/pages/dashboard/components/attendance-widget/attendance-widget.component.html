<section class="rounded-[28px] border border-slate-200/70 bg-white/90 p-6 shadow-[0_22px_60px_rgba(15,23,42,0.08)] backdrop-blur-xl">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-[11px] font-bold uppercase tracking-[0.28em] text-emerald-700">Attendance Widget</p>
      <h2 class="mt-1 font-['Space_Grotesk'] text-2xl font-semibold text-slate-950">{{ widget.headline }}</h2>
      <p class="mt-1 text-sm leading-6 text-slate-500">{{ widget.description }}</p>
    </div>

    <div class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-600">
      Live quality
    </div>
  </div>

  <div class="mt-8 grid gap-6 lg:grid-cols-[220px_minmax(0,1fr)] lg:items-center">
    <div class="mx-auto flex h-48 w-48 items-center justify-center rounded-full p-4" [style.background]="widget.progressBackground">
      <div class="flex h-full w-full flex-col items-center justify-center rounded-full bg-white shadow-inner">
        <span class="font-['Space_Grotesk'] text-4xl font-semibold text-slate-950">{{ widget.value }}</span>
        <span class="mt-1 text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">coverage</span>
      </div>
    </div>

    <div class="space-y-4">
      <div class="rounded-3xl bg-slate-50 p-4">
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Status</p>
        <p class="mt-2 text-sm leading-6 text-slate-600">{{ widget.footnote }}</p>
      </div>

      <div class="flex items-center gap-3">
        <span class="inline-flex rounded-full px-3 py-1 text-xs font-semibold" [ngClass]="widget.trendClass">
          {{ widget.trendLabel }}
        </span>
        <span class="text-sm text-slate-500">Attendance remains part of the executive dashboard health view.</span>
      </div>
    </div>
  </div>
</section>
