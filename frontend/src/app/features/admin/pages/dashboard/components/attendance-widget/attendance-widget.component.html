<section class="rounded-xl border border-outline-variant/20 bg-surface-container-lowest p-4 shadow-sm sm:p-5">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <p class="text-[11px] font-semibold uppercase tracking-[0.16em] text-on-surface-variant">Attendance Widget</p>
      <h2 class="mt-1 font-['Space_Grotesk'] text-xl font-semibold text-primary">{{ widget.headline }}</h2>
      <p class="mt-1 text-sm leading-6 text-on-surface-variant">{{ widget.description }}</p>
    </div>

    <div class="w-fit rounded-lg border border-outline-variant/20 bg-surface-container-low px-3 py-1 text-xs font-semibold text-primary">
      Live quality
    </div>
  </div>

  <div class="mt-5 grid gap-5 lg:grid-cols-[180px_minmax(0,1fr)] lg:items-center">
    <div class="mx-auto flex h-40 w-40 items-center justify-center rounded-full p-3" [style.background]="widget.progressBackground">
      <div class="flex h-full w-full flex-col items-center justify-center rounded-full bg-white shadow-inner">
        <span class="font-['Space_Grotesk'] text-3xl font-semibold text-primary">{{ widget.value }}</span>
        <span class="mt-1 text-xs font-semibold uppercase tracking-[0.12em] text-on-surface-variant">coverage</span>
      </div>
    </div>

    <div class="space-y-4">
      <div class="rounded-lg bg-surface-container-low p-4">
        <p class="text-xs font-semibold uppercase tracking-[0.12em] text-on-surface-variant">Status</p>
        <p class="mt-2 text-sm leading-6 text-on-surface-variant">{{ widget.footnote }}</p>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <span class="inline-flex rounded-full px-3 py-1 text-xs font-semibold" [ngClass]="widget.trendClass">
          {{ widget.trendLabel }}
        </span>
        <span class="text-sm text-on-surface-variant">Attendance remains part of the executive dashboard health view.</span>
      </div>
    </div>
  </div>
</section>
