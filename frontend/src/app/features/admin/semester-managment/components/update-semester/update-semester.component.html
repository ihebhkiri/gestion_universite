@if (isVisible && semester) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-background/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>
  <div class="relative bg-surface rounded-2xl shadow-[0_24px_48px_rgba(2,36,72,0.12)] border border-outline-variant/30 w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
    <div class="px-6 py-4 border-b border-outline-variant/20 flex items-center justify-between bg-surface-container-lowest sticky top-0 z-10">
      <div>
        <h3 class="font-headline text-xl font-semibold text-primary-container">Update Semester</h3>
        <p class="font-body text-sm text-on-surface-variant mt-0.5">Edit semester settings and timeline.</p>
      </div>
      <button (click)="onClose()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant transition-colors group">
        <span class="material-symbols-outlined text-lg group-hover:text-error transition-colors">close</span>
      </button>
    </div>

    <div class="p-6 overflow-y-auto">
      <form (ngSubmit)="onSubmit()" #semForm="ngForm" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Name <span class="text-error">*</span></label>
            <input [(ngModel)]="form.name" name="name" required
                   class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm uppercase"/>
          </div>
          <div class="md:col-span-2">
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Academic Year <span class="text-error">*</span></label>
            <select [(ngModel)]="form.academicYearId" name="academicYearId" required
                    class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm">
              @for (y of academicYears; track y.id) {
                <option [ngValue]="y.id">{{ y.label }} @if (y.active) { (ACTIVE) }</option>
              }
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Start date <span class="text-error">*</span></label>
            <input type="date" [(ngModel)]="form.startDate" name="startDate" required
                   class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"/>
          </div>
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">End date <span class="text-error">*</span></label>
            <input type="date" [(ngModel)]="form.endDate" name="endDate" required
                   class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"/>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Exam start date</label>
            <input type="date" [(ngModel)]="form.examStartDate" name="examStartDate"
                   class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"/>
          </div>
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Exam end date</label>
            <input type="date" [(ngModel)]="form.examEndDate" name="examEndDate"
                   class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"/>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
          <div>
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Status <span class="text-error">*</span></label>
            <select [(ngModel)]="form.status" name="status" required
                    class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm">
              @for (s of statuses; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block font-label text-sm font-semibold text-on-surface mb-1.5">Description</label>
            <textarea [(ngModel)]="form.description" name="description" rows="2"
                      class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-sm"></textarea>
          </div>
        </div>
      </form>
    </div>

    <div class="px-6 py-4 border-t border-outline-variant/20 bg-surface-container-lowest flex items-center justify-end gap-3 sticky bottom-0 z-10">
      <button type="button" (click)="onClose()" class="px-5 py-2 text-on-surface font-label text-sm font-semibold rounded-lg hover:bg-surface-container-highest transition-colors">Cancel</button>
      <button type="button" (click)="onSubmit()" [disabled]="!semForm.valid"
              class="px-5 py-2 bg-gradient-to-t from-primary to-primary-container text-on-primary font-label text-sm font-semibold rounded-lg shadow-[0_4px_12px_rgba(2,36,72,0.15)] hover:shadow-[0_6px_16px_rgba(2,36,72,0.2)] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">save</span>
        Update Semester
      </button>
    </div>
  </div>
</div>
}
